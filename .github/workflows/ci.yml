name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
      AUTH_SECRET: "ci-placeholder-not-a-real-secret"
      AUTH_TRUST_HOST: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx prisma validate

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run build
